<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>예약 발송 완료 - 메시징 서비스</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="js/header.js"></script>
    <style>
/* 완료 페이지 전용 */
.main-content {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 200px);
}

/* 발송 완료 컨테이너 */
.complete-container {
    text-align: center;
    padding: 60px 40px;
    background-color: var(--surface-color);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border-color);
    max-width: 600px;
    width: 100%;
}

.complete-icon {
    width: 120px;
    height: 120px;
    margin: 0 auto 32px;
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    animation: scaleIn 0.5s ease-out;
}

@keyframes scaleIn {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

@keyframes fadeInUp {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

.complete-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--success-color);
    margin-bottom: 16px;
    animation: fadeInUp 0.5s ease-out 0.2s both;
}

.complete-description {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 40px;
    animation: fadeInUp 0.5s ease-out 0.3s both;
}

.complete-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeInUp 0.5s ease-out 0.4s both;
}

.complete-actions .btn {
    min-width: 180px;
}

/* 발송 정보 요약 */
.send-summary {
    background-color: var(--bg-color);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 32px;
    text-align: left;
    animation: fadeInUp 0.5s ease-out 0.35s both;
}

.send-summary-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-color);
}

.send-summary-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 14px;
}

.send-summary-label {
    color: var(--text-secondary);
}

.send-summary-value {
    font-weight: 500;
    color: var(--text-primary);
}

@media (max-width: 768px) {
    .complete-container {
        padding: 40px 24px;
        margin: 16px;
    }
    .complete-icon {
        width: 100px;
        height: 100px;
        font-size: 48px;
    }
    .complete-title { font-size: 24px; }
    .complete-actions { flex-direction: column; }
    .complete-actions .btn { width: 100%; }
}
    </style>
</head>
<body>
    <div class="app-container">
        <script>
            document.write(createHeader());
        </script>

        <main class="main-content">
            <div class="complete-container">
                <div class="complete-icon">✅</div>
                <h1 class="complete-title">예약 발송이 등록되었습니다</h1>
                <p class="complete-description">
                    예약이 성공적으로 등록되었습니다.<br>
                    예약내역 페이지에서 발송 예정 일시를 확인하고 수정·취소할 수 있습니다.
                </p>

                <div class="send-summary" id="sendSummary">
                    <div class="send-summary-title">예약 정보</div>
                    <div class="send-summary-row">
                        <span class="send-summary-label">발송 유형</span>
                        <span class="send-summary-value" id="summaryType">예약발송</span>
                    </div>
                    <div class="send-summary-row">
                        <span class="send-summary-label">수신자 수</span>
                        <span class="send-summary-value" id="summaryRecipients">0명</span>
                    </div>
                    <div class="send-summary-row">
                        <span class="send-summary-label">예약 발송 시간</span>
                        <span class="send-summary-value" id="summarySendTime">-</span>
                    </div>
                    <div class="send-summary-row">
                        <span class="send-summary-label">예상 비용</span>
                        <span class="send-summary-value" id="summaryCost">0 P</span>
                    </div>
                </div>

                <div class="complete-actions">
                    <a href="javascript:history.back()" class="btn btn-outline btn-lg" id="backToSendBtn">발송페이지로 돌아가기</a>
                    <a href="send-reservation.html" class="btn btn-primary btn-lg">예약내역 페이지 이동</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initDropdownMenus();

            var urlParams = new URLSearchParams(window.location.search);
            var type = urlParams.get('type') || '예약발송';
            var recipients = urlParams.get('recipients') || '0';
            var sendTime = urlParams.get('sendTime') || '-';
            var cost = urlParams.get('cost') || '0';
            var from = urlParams.get('from') || 'message-send-general.html';

            document.getElementById('summaryType').textContent = decodeURIComponent(type);
            document.getElementById('summaryRecipients').textContent = recipients + '명';
            document.getElementById('summarySendTime').textContent = decodeURIComponent(sendTime);
            document.getElementById('summaryCost').textContent = cost + ' P';

            document.getElementById('backToSendBtn').href = from;
        });
    </script>
    <script src="js/footer.js"></script>
    <script>
        document.write(createFloatingMenu());
        document.write(createFooter());
    </script>
</body>
</html>
