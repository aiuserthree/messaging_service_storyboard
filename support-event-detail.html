<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>이벤트 상세 - 톡벨</title>
    <script src="js/header.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .page-header {
            margin-bottom: 32px;
        }

        .page-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .page-description {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 탭 메뉴 */
        .support-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .support-tab {
            padding: 14px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .support-tab:hover {
            color: var(--text-primary);
        }

        .support-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* 이벤트 상세 컨테이너 */
        .event-detail-container {
            background-color: var(--surface-color);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* 이벤트 상태 뱃지 (상단 헤더 영역에 배치) */
        .event-status-badge {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .event-status-badge.ongoing {
            background-color: #10b981;
            color: white;
        }

        .event-status-badge.ended {
            background-color: #6b7280;
            color: white;
        }

        .event-status-badge.upcoming {
            background-color: #f59e0b;
            color: white;
        }

        /* 이벤트 정보 헤더 — 배너 없이 최상단에 제목·기간 */
        .event-detail-header {
            padding: 28px 32px;
            border-bottom: 1px solid var(--border-color);
            background-color: #f8fafc;
        }

        .event-detail-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }

        .event-detail-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            line-height: 1.35;
        }

        .event-detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .event-detail-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .event-detail-meta-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        /*
         * 통이미지(전체 이미지 본문) 유형
         * 어드민에서 본문을 통이미지로 등록할 때 FO는 본문 영역 상하좌우 패딩 0으로 렌더링한다.
         */
        .event-detail-content {
            padding: 32px;
        }

        .event-detail-content.event-detail-content--full-image {
            padding: 0;
        }

        /* 통이미지 원본 가로 1350px — 이보다 크게 늘리면 업스케일로 흐려짐. WebP 2x로 레티나 대응 */
        .event-detail-content--full-image picture {
            display: block;
            max-width: 1350px;
            margin-left: auto;
            margin-right: auto;
        }

        .event-body-full-image {
            width: 100%;
            height: auto;
            display: block;
            vertical-align: top;
        }

        /* 버튼 영역 */
        .event-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-outline {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background-color: var(--bg-color);
            border-color: #cbd5e1;
        }

        /* 참여하기 버튼 */
        .event-cta {
            text-align: center;
            padding: 32px;
            border-top: 1px solid var(--border-color);
            background-color: #f8fafc;
        }

        .event-cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 48px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .event-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }

        .event-cta-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        @media (max-width: 768px) {
            .event-detail-header {
                padding: 20px 16px;
            }

            .event-detail-header-row {
                flex-direction: column;
                align-items: stretch;
            }

            .event-status-badge {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <script>
            document.write(createHeader('support'));
        </script>

        <main class="main-content">
            <div class="page-header">
                <h2>이벤트</h2>
                <p class="page-description">톡벨에서 제공하는 다양한 이벤트를 확인하실 수 있습니다.</p>
            </div>

            <!-- 이벤트 상세 (통이미지 본문: 제목·기간 → 패딩 없는 본문 이미지) -->
            <div class="event-detail-container">
                <div class="event-detail-header">
                    <div class="event-detail-header-row">
                        <h3 class="event-detail-title">톡벨 신규 회원가입 이벤트</h3>
                        <span class="event-status-badge ongoing">진행중</span>
                    </div>
                    <div class="event-detail-meta">
                        <div class="event-detail-meta-item">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                                <line x1="16" x2="16" y1="2" y2="6"></line>
                                <line x1="8" x2="8" y1="2" y2="6"></line>
                                <line x1="3" x2="21" y1="10" y2="10"></line>
                            </svg>
                            <span>2026.01.01 ~ 2026.12.31</span>
                        </div>
                    </div>
                </div>

                <div class="event-detail-content event-detail-content--full-image">
                    <picture>
                        <source type="image/webp" srcset="main/img/events/event-new-signup-free-sms-full.webp 1x, main/img/events/event-new-signup-free-sms-full@2x.webp 2x">
                        <img class="event-body-full-image"
                            src="main/img/events/event-new-signup-free-sms-full.png"
                            width="1350"
                            height="1902"
                            alt="톡벨 신규 회원가입 이벤트 안내 통이미지"
                            decoding="async">
                    </picture>
                </div>

                <div class="event-cta">
                    <button class="event-cta-btn" type="button" onclick="participateEvent()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v4"></path>
                            <path d="m16.24 7.76-2.83 2.83"></path>
                            <path d="M22 12h-4"></path>
                            <path d="m16.24 16.24-2.83-2.83"></path>
                            <path d="M12 22v-4"></path>
                            <path d="m7.76 16.24 2.83-2.83"></path>
                            <path d="M2 12h4"></path>
                            <path d="m7.76 7.76 2.83 2.83"></path>
                        </svg>
                        가입하고 혜택 받기
                    </button>
                </div>
            </div>

            <div class="event-actions">
                <a href="support-event.html" class="btn btn-outline">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" x2="21" y1="6" y2="6"></line>
                        <line x1="8" x2="21" y1="12" y2="12"></line>
                        <line x1="8" x2="21" y1="18" y2="18"></line>
                        <line x1="3" x2="3.01" y1="6" y2="6"></line>
                        <line x1="3" x2="3.01" y1="12" y2="12"></line>
                        <line x1="3" x2="3.01" y1="18" y2="18"></line>
                    </svg>
                    목록으로
                </a>
            </div>
        </main>
    </div>

    <script>
        function participateEvent() {
            window.location.href = 'signup.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initDropdownMenus === 'function') {
                initDropdownMenus();
            }
        });
    </script>

    <script src="js/footer.js"></script>
    <script>
        document.write(createFloatingMenu());
        document.write(createFooter());
    </script>
</body>
</html>
